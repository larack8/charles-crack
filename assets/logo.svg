<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" shape-rendering="geometricPrecision">
  <!--
    Charles Keygen — app logo.
    Concept: a stylised key whose bow forms a "C" (Charles),
    on a rounded-square app-tile, using the Charles brand yellow
    over a deep-navy gradient (evokes the Charles Proxy waterfall UI).
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1F2A44"/>
      <stop offset="100%" stop-color="#0E1628"/>
    </linearGradient>
    <linearGradient id="key" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FFD447"/>
      <stop offset="100%" stop-color="#F5A524"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App-tile background (rounded square, iOS/macOS style) -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle network-waterfall hint: diagonal traffic lines -->
  <g stroke="#2B3A60" stroke-width="6" stroke-linecap="round" opacity="0.55">
    <line x1="110" y1="210" x2="430" y2="210"/>
    <line x1="110" y1="290" x2="560" y2="290"/>
    <line x1="110" y1="370" x2="360" y2="370"/>
    <line x1="110" y1="820" x2="520" y2="820"/>
    <line x1="110" y1="740" x2="380" y2="740"/>
  </g>

  <!-- Key group: bow (C-shaped) + shaft + teeth -->
  <g filter="url(#shadow)">
    <!-- Bow: thick C-ring -->
    <path d="
        M 640 512
        a 200 200 0 1 0 -120 186
        l 56 -72
        a 110 110 0 1 1 62 -104
        Z"
      fill="url(#key)"/>

    <!-- Inner highlight on bow for depth -->
    <path d="
        M 616 512
        a 176 176 0 1 0 -110 164
        l 22 -30
        a 146 146 0 1 1 88 -140
        Z"
      fill="#FFE78A" opacity="0.45"/>

    <!-- Shaft + teeth (extend to the right, classic key silhouette) -->
    <path d="
        M 630 480
        L 900 480
        L 900 520
        L 860 520
        L 860 576
        L 820 576
        L 820 520
        L 780 520
        L 780 600
        L 740 600
        L 740 520
        L 630 520
        Z"
      fill="url(#key)"/>

    <!-- Keyhole accent inside the bow (hints at "unlock") -->
    <circle cx="452" cy="512" r="42" fill="#0E1628"/>
    <rect   x="440" y="512" width="24" height="70" rx="6" fill="#0E1628"/>
  </g>
</svg>
